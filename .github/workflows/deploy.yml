name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'js/**'
      - 'css/**'
      - 'vercel.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Frontend to Vercel
        run: |
          echo "Vercel deploy triggered automatically when connected"
          echo "Connect repo at vercel.com to enable auto-deploy"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL not configured. Set it in GitHub repo settings."
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}